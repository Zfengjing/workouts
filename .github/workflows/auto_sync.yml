name: Auto Sync & Deploy

on:
  schedule:
    - cron: '30 0 * * *'   # UTC 0:30 = 北京时间早上 8:30
    - cron: '0 13 * * *'   # UTC 13:00 = 北京时间晚上 9:00
  workflow_dispatch:        # 允许手动触发

permissions:
  contents: write

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5  # 已升级到 v5

      - name: Setup Node.js
        uses: actions/setup-node@v5  # 已升级到 v5
        with:
          node-version: '22'  # 使用最新的 LTS 版本

      - name: Install pnpm (v8.15.0)
        run: npm install -g pnpm@8.15.0  # 全局安装，确保后续可用

      - name: Setup Python
        uses: actions/setup-python@v6  # 已升级到 v6
        with:
          python-version: '3.12'  # 使用较新的 Python 版本

      - name: Install Python dependencies
        run: |
            pip install -r requirements.txt
            pip install geopy

      - name: Sync Strava data
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: python run_page/strava_sync_recent.py $STRAVA_CLIENT_ID $STRAVA_CLIENT_SECRET $STRAVA_REFRESH_TOKEN
      
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add run_page/data.db src/static/activities.json || true
          git commit -m "Auto sync: update Strava data" || echo "No changes to commit"
          git push || echo "Nothing to push"
      
      - name: Build and Deploy to GitHub Pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm install
          pnpm build
          cd dist
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy to GitHub Pages"
          git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
          git push -f origin master:gh-pages
